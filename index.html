<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

.klncelogo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:20px;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1e3c72;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2a5298;
}

.footer{
    margin-top:15px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- Replace logo.png with your logo -->
    <img src="./klncelogo.gif" class="klncelogo" alt="KLNCE Logo">

    <h2>Login</h2>

    <form>

        <input type="text"
               placeholder="Username"
               required>

        <input type="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        © 2026
    </div>

</div>

</body>
</html>
